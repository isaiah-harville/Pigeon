name: Rust crate CI
description: Install Rust, cache a crate, then run fmt, clippy, tests, and optional docs.

inputs:
  working-directory:
    description: Directory containing the crate Cargo.toml.
    required: true
  cache-workspaces:
    description: Workspace path passed to Swatinem/rust-cache.
    required: true
  docs:
    description: Whether to run cargo doc for the crate.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.cache-workspaces }}

    - name: Format
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: cargo fmt --check

    - name: Clippy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: cargo clippy --all-targets -- -D warnings

    - name: Test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: cargo test

    - name: Docs
      if: inputs.docs == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: cargo doc --no-deps --document-private-items
