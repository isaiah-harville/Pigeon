name: Rust workspace package CI
description: Install Rust, cache the workspace, then run fmt, clippy, tests, and optional docs for one package.

inputs:
  package:
    description: Cargo package name to check with -p.
    required: true
  docs:
    description: Whether to run cargo doc for the crate.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: .

    - name: Format
      shell: bash
      run: cargo fmt --all --check

    - name: Clippy
      shell: bash
      run: cargo clippy -p "${{ inputs.package }}" --all-targets -- -D warnings

    - name: Test
      shell: bash
      run: cargo test -p "${{ inputs.package }}"

    - name: Docs
      if: inputs.docs == 'true'
      shell: bash
      run: cargo doc -p "${{ inputs.package }}" --no-deps --document-private-items
