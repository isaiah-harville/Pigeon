name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  format:
    name: SwiftFormat
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swift-format

      - name: Check formatting
        run: |
          swift-format lint --recursive --parallel Pigeon
          if [ $? -ne 0 ]; then
            echo "Run 'swift-format format --recursive --in-place Pigeon' locally to fix."
            exit 1
          fi

  # Build the gitignored PigeonFFI XCFramework + generated bindings once from
  # the Rust crates, then share them with every job that links PigeonFFI so the
  # expensive Rust/UniFFI build runs a single time per workflow. The build
  # output is cached across runs keyed on its inputs, so unchanged core/mesh/ffi/
  # proto sources skip the rebuild (toolchain install, brew, and cargo) entirely.
  xcframework:
    name: Build PigeonFFI XCFramework
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Cache the produced XCFramework + bindings. The key changes only when an
      # input that affects the output changes (sources, the wire schema, or the
      # locked dependency set). Bump the v1 salt to force a rebuild manually.
      - name: Cache PigeonFFI build output
        id: xcframework-cache
        uses: actions/cache@v4
        with:
          path: |
            Pigeon/PigeonFFI/PigeonFFIBindings.xcframework
            Pigeon/PigeonFFI/Sources/PigeonFFI/Generated
          key: pigeon-ffi-xcframework-v1-${{ runner.os }}-${{ hashFiles('pigeon-core/**', 'pigeon-ffi/**', 'pigeon-mesh/**', 'proto/**', 'Cargo.lock') }}

      - uses: dtolnay/rust-toolchain@stable
        if: steps.xcframework-cache.outputs.cache-hit != 'true'
      - name: Cache cargo build (target + registry)
        if: steps.xcframework-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
      - name: Install protobuf tooling
        if: steps.xcframework-cache.outputs.cache-hit != 'true'
        run: brew install protobuf swift-protobuf

      - name: Build PigeonFFI XCFramework
        if: steps.xcframework-cache.outputs.cache-hit != 'true'
        run: bash pigeon-ffi/build-xcframework.sh

      - name: Upload PigeonFFI build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pigeon-ffi-xcframework
          if-no-files-found: error
          path: |
            Pigeon/PigeonFFI/PigeonFFIBindings.xcframework
            Pigeon/PigeonFFI/Sources/PigeonFFI/Generated

  core-tests:
    name: PigeonFFI XCFramework Tests
    runs-on: macos-26
    needs: xcframework
    steps:
      - uses: actions/checkout@v4

      - name: Download PigeonFFI build artifacts
        uses: actions/download-artifact@v4
        with:
          name: pigeon-ffi-xcframework
          path: Pigeon/PigeonFFI

      - name: Test PigeonFFI
        run: swift test --package-path Pigeon/PigeonFFI

  app:
    name: iOS App Build & Tests
    runs-on: macos-26
    needs: xcframework
    steps:
      - uses: actions/checkout@v4

      - name: Download PigeonFFI build artifacts
        uses: actions/download-artifact@v4
        with:
          name: pigeon-ffi-xcframework
          path: Pigeon/PigeonFFI

      # Confirm the app compiles for a real device (no signing), then run the
      # PigeonTests suite on the simulator. xcodebuild test reuses the build, so
      # this is one device-compile check plus the test run, not two full builds.
      - name: Build Pigeon (device)
        run: |
          xcodebuild build \
            -project Pigeon/Pigeon.xcodeproj \
            -scheme Pigeon \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Test Pigeon (PigeonTests)
        run: |
          xcodebuild test \
            -project Pigeon/Pigeon.xcodeproj \
            -scheme Pigeon \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO
