name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  format:
    name: SwiftFormat
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swift-format

      - name: Check formatting
        run: |
          swift-format lint --recursive --parallel Pigeon PigeonCore PigeonMesh
          if [ $? -ne 0 ]; then
            echo "Run 'swift-format format --recursive --in-place Pigeon PigeonCore PigeonMesh' locally to fix."
            exit 1
          fi

  package-tests:
    name: Swift Package Tests (${{ matrix.package }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package:
          - PigeonMesh
    steps:
      - uses: actions/checkout@v4

      - name: Test ${{ matrix.package }}
        run: swift test --package-path "${{ matrix.package }}"

  # Build the gitignored PigeonCore XCFramework + generated bindings once from
  # the Rust crate, then share them with every job that links PigeonCore so the
  # expensive Rust/UniFFI build runs a single time per workflow.
  xcframework:
    name: Build PigeonCore XCFramework
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - name: Install protobuf tooling
        run: brew install protobuf swift-protobuf

      - name: Build PigeonCore XCFramework
        run: bash pigeon-core-ffi/build-xcframework.sh

      - name: Upload PigeonCore build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pigeon-core-xcframework
          if-no-files-found: error
          path: |
            PigeonCore/PigeonCoreFFI.xcframework
            PigeonCore/Sources/PigeonCore/Generated

  core-tests:
    name: PigeonCore XCFramework Tests
    runs-on: macos-26
    needs: xcframework
    steps:
      - uses: actions/checkout@v4

      - name: Download PigeonCore build artifacts
        uses: actions/download-artifact@v4
        with:
          name: pigeon-core-xcframework
          path: PigeonCore

      - name: Test PigeonCore
        run: swift test --package-path PigeonCore

  app:
    name: iOS App Build & Tests
    runs-on: macos-26
    needs: xcframework
    steps:
      - uses: actions/checkout@v4

      - name: Download PigeonCore build artifacts
        uses: actions/download-artifact@v4
        with:
          name: pigeon-core-xcframework
          path: PigeonCore

      # Confirm the app compiles for a real device (no signing), then run the
      # PigeonTests suite on the simulator. xcodebuild test reuses the build, so
      # this is one device-compile check plus the test run, not two full builds.
      - name: Build Pigeon (device)
        run: |
          xcodebuild build \
            -project Pigeon/Pigeon.xcodeproj \
            -scheme Pigeon \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Test Pigeon (PigeonTests)
        run: |
          xcodebuild test \
            -project Pigeon/Pigeon.xcodeproj \
            -scheme Pigeon \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO
