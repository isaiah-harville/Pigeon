name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  format:
    name: SwiftFormat
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swift-format

      - name: Check formatting
        run: |
          swift-format lint --recursive --parallel Pigeon PigeonCrypto PigeonMesh
          if [ $? -ne 0 ]; then
            echo "Run 'swift-format format --recursive --in-place Pigeon PigeonCrypto PigeonMesh' locally to fix."
            exit 1
          fi

  package-tests:
    name: Swift Package Tests (${{ matrix.package }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package:
          - PigeonCrypto
          - PigeonMesh
    steps:
      - uses: actions/checkout@v4

      - name: Test ${{ matrix.package }}
        run: swift test --package-path "${{ matrix.package }}"

  core-tests:
    name: PigeonCore XCFramework Tests
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # The XCFramework is a build artifact (gitignored), so build it from the
      # Rust crate first; the script also adds the Rust targets it needs.
      - uses: dtolnay/rust-toolchain@stable
      - name: Build PigeonCore XCFramework
        run: bash pigeon-core-ffi/build-xcframework.sh

      - name: Test PigeonCore
        run: swift test --package-path PigeonCore

  app-build:
    name: iOS App Build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build Pigeon
        run: |
          xcodebuild build \
            -project Pigeon/Pigeon.xcodeproj \
            -scheme Pigeon \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

  app-tests:
    name: iOS App Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Test Pigeon (PigeonTests)
        run: |
          xcodebuild test \
            -project Pigeon/Pigeon.xcodeproj \
            -scheme Pigeon \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO
