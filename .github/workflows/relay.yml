name: Relay

on:
  push:
    branches: [main]
    paths: ["relay/**", ".github/workflows/relay.yml"]
    tags: ["relay-v*"]
  pull_request:
    branches: [main]
    paths: ["relay/**", ".github/workflows/relay.yml"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pigeon/relay

jobs:
  check:
    name: Check & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: relay
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  image:
    name: Build & push image
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # `latest` on every push to the default branch; the cut version (e.g.
          # `relay-v1.2.3` -> `1.2.3`) on a tag. No sha/branch tags — nothing
          # else lands in the registry.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=relay-v(.*),group=1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: relay
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Don't publish provenance/SBOM attestations — they show up as extra
          # "untagged" manifests in GHCR. Keep the registry to just the tagged
          # multi-arch image.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Prune orphaned untagged versions (e.g. the digest the previous `latest`
      # pointed at). Multi-arch aware: it keeps the per-platform child manifests
      # that the current tags still reference, deleting only true orphans.
      - name: Delete untagged versions
        if: github.event_name != 'pull_request'
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          owner: ${{ github.repository_owner }}
          packages: pigeon/relay
          token: ${{ secrets.GITHUB_TOKEN }}
          delete-untagged: true
