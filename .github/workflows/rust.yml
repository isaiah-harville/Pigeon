name: Rust

on:
  push:
    branches: [main]
    paths:
      - "pigeon-core/**"
      - "pigeon-ffi/**"
      - "pigeon-mesh/**"
      - "pigeon-relay/**"
      - "proto/**"
      - ".github/actions/rust-crate-ci/**"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "pigeon-core/**"
      - "pigeon-ffi/**"
      - "pigeon-mesh/**"
      - "pigeon-relay/**"
      - "proto/**"
      - ".github/actions/rust-crate-ci/**"
      - ".github/workflows/rust.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pigeon-core:
    name: pigeon-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-crate-ci
        with:
          package: pigeon-core
          docs: "true"

  pigeon-mesh:
    name: pigeon-mesh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-crate-ci
        with:
          package: pigeon-mesh
          docs: "true"

  pigeon-ffi:
    name: pigeon-ffi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-crate-ci
        with:
          package: pigeon-ffi

  pigeon-relay:
    name: pigeon-relay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-crate-ci
        with:
          package: pigeon-relay
