name: pigeon-core

on:
  push:
    branches: [main]
    paths:
      - "pigeon-core/**"
      - ".github/workflows/pigeon-core.yml"
  pull_request:
    branches: [main]
    paths:
      - "pigeon-core/**"
      - ".github/workflows/pigeon-core.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pigeon-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pigeon-core
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Docs
        run: cargo doc --no-deps --document-private-items
