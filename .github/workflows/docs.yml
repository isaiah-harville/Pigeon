name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "PigeonMesh/Package.swift"
      - "PigeonMesh/Package.resolved"
      - "pigeon-relay/Cargo.toml"
      - "pigeon-relay/Cargo.lock"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pigeon-core/Cargo.toml"
      - "pigeon-core/Cargo.lock"
      - "Pigeon/README.md"
      - "Pigeon/CONTRIBUTING.md"
      - "Pigeon/docs/**"
      - "Pigeon/mkdocs.yml"
      - "PigeonMesh/README.md"
      - "PigeonMesh/CONTRIBUTING.md"
      - "PigeonMesh/docs/**"
      - "PigeonMesh/mkdocs.yml"
      - "pigeon-relay/README.md"
      - "pigeon-relay/CONTRIBUTING.md"
      - "pigeon-relay/docs/**"
      - "pigeon-relay/mkdocs.yml"
      - "pigeon-core/src/**"
      - "CONTRIBUTING.md"
      - "README.md"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "PigeonMesh/Package.swift"
      - "PigeonMesh/Package.resolved"
      - "pigeon-relay/Cargo.toml"
      - "pigeon-relay/Cargo.lock"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pigeon-core/Cargo.toml"
      - "pigeon-core/Cargo.lock"
      - "Pigeon/README.md"
      - "Pigeon/CONTRIBUTING.md"
      - "Pigeon/docs/**"
      - "Pigeon/mkdocs.yml"
      - "PigeonMesh/README.md"
      - "PigeonMesh/CONTRIBUTING.md"
      - "PigeonMesh/docs/**"
      - "PigeonMesh/mkdocs.yml"
      - "pigeon-relay/README.md"
      - "pigeon-relay/CONTRIBUTING.md"
      - "pigeon-relay/docs/**"
      - "pigeon-relay/mkdocs.yml"
      - "pigeon-core/src/**"
      - "CONTRIBUTING.md"
      - "README.md"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCC_HOSTING_BASE_PATH: ${{ github.event.repository.name }}/api

jobs:
  check:
    name: Check Docs
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --locked --group docs

      - name: Build docs
        run: uv run --group docs mkdocs build --strict

  build:
    name: Build Docs
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install docs dependencies
        run: uv sync --locked --group docs

      - name: Build docs
        run: uv run --group docs mkdocs build --strict

      - name: Build Swift API docs
        run: |
          mkdir -p "$PWD/public/api/PigeonMesh"

          swift package \
            --package-path PigeonMesh \
            --allow-writing-to-directory "$PWD/public/api/PigeonMesh" \
            generate-documentation \
            --target PigeonMesh \
            --output-path "$PWD/public/api/PigeonMesh" \
            --transform-for-static-hosting \
            --hosting-base-path "$DOCC_HOSTING_BASE_PATH/PigeonMesh"

      - name: Build relay API docs
        run: |
          rm -rf "$RUNNER_TEMP/pigeon-relay-docs" "$PWD/public/api/pigeon-relay"
          cargo doc \
            --manifest-path pigeon-relay/Cargo.toml \
            --no-deps \
            --document-private-items \
            --target-dir "$RUNNER_TEMP/pigeon-relay-docs"
          mkdir -p "$PWD/public/api/pigeon-relay"
          cp -R "$RUNNER_TEMP/pigeon-relay-docs/doc" "$PWD/public/api/pigeon-relay/doc"

      - name: Build pigeon-core API docs
        run: |
          rm -rf "$RUNNER_TEMP/pigeon-core-docs" "$PWD/public/api/pigeon-core"
          cargo doc \
            -p pigeon-core \
            --no-deps \
            --document-private-items \
            --target-dir "$RUNNER_TEMP/pigeon-core-docs"
          mkdir -p "$PWD/public/api/pigeon-core"
          cp -R "$RUNNER_TEMP/pigeon-core-docs/doc" "$PWD/public/api/pigeon-core/doc"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
