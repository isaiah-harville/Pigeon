included:
  - Pigeon/Pigeon
  - PigeonCrypto
  - PigeonMesh

excluded:
  - Pigeon/Pigeon.xcodeproj
  - PigeonCrypto/.build
  - PigeonCrypto/.swiftpm
  - PigeonMesh/.build
  - PigeonMesh/.swiftpm
  - DerivedData
  - .build

opt_in_rules:
  - anonymous_argument_in_multiline_closure
  - array_init
  - async_without_await
  - closure_body_length
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - direct_return
  - discouraged_assert
  - discouraged_default_parameter
  - discouraged_object_literal
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - final_test_case
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - function_default_parameter_at_end
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - lower_acl_than_parent
  - modifier_order
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_key_path
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_swiftui_state
  - prohibited_super_call
  - raw_value_for_camel_cased_codable_enum
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - single_test_class
  - sorted_first_last
  - static_operator
  - strict_fileprivate
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unhandled_throwing_task
  - unneeded_parentheses_in_closure_argument
  - unneeded_throws_rethrows
  - unowned_variable_capture
  - untyped_error_in_catch
  - unused_parameter
  - weak_delegate
  - yoda_condition

disabled_rules:
  - colon
  - comma
  - comment_spacing
  - leading_whitespace
  - opening_brace
  - statement_position
  - switch_case_alignment
  - trailing_comma
  - trailing_newline
  - trailing_whitespace
  - vertical_parameter_alignment
  - vertical_parameter_alignment_on_call
  - vertical_whitespace
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces

line_length:
  warning: 100
  error: 120
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: false
  ignores_interpolated_strings: false

file_length:
  warning: 350
  error: 500
  ignore_comment_only_lines: true

type_body_length:
  warning: 200
  error: 300

function_body_length:
  warning: 40
  error: 60

closure_body_length:
  warning: 25
  error: 40

cyclomatic_complexity:
  warning: 8
  error: 12
  ignores_case_statements: true

function_parameter_count:
  warning: 5
  error: 6

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level:
    warning: 2
    error: 3
  function_level:
    warning: 3
    error: 4

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 45
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - n
    - ad
    - ct
    - pt
    - rk
    - ck
    - mk
    - pn
    - iv

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 45
    error: 60

reporter: "xcode"
