site_name: Pigeon
site_description: End-to-end encrypted mesh messenger with local transports and optional zero-knowledge relays.
repo_url: https://github.com/isaiah-harville/Pigeon
edit_uri: edit/main/
docs_dir: docs
site_dir: public

theme:
  name: material
  logo: assets/pigeon-logo.png
  favicon: assets/pigeon-logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - navigation.top

plugins:
  - search
  - monorepo

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences

nav:
  - Overview: index.md
  - Security Model: SECURITY_MODEL.md
  - API Reference: API.md
  - Pigeon iOS: "!include Pigeon/mkdocs.yml"
  - pigeon-core: "!include pigeon-core/mkdocs.yml"
  - PigeonMesh: "!include PigeonMesh/mkdocs.yml"
  - pigeon-relay: "!include pigeon-relay/mkdocs.yml"
